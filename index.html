<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J&A Shoes — Catálogo 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #F0F4FF; color: #1a1a2e; padding-bottom: 60px; }

  /* COVER */
  .cover {
    background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
    padding: 60px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 6px 22px;
    color: #fff;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .brand { font-size: 64px; font-weight: 700; color: #fff; line-height: 1; }
  .brand span { color: #90CAF9; }
  .brand-sub { font-size: 24px; font-weight: 500; color: #BBDEFB; margin-top: 4px; margin-bottom: 16px; letter-spacing: 6px; }
  .divider { width: 60px; height: 2px; background: rgba(255,255,255,0.4); margin: 0 auto 16px; border-radius: 2px; }
  .tagline { font-size: 12px; color: rgba(255,255,255,0.65); letter-spacing: 4px; text-transform: uppercase; }

  /* INFO BAR */
  .info-bar {
    background: #0D47A1;
    padding: 14px 20px;
    display: flex; justify-content: center;
    gap: 24px; flex-wrap: wrap;
  }
  .info-item { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; }
  .info-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #90CAF9; }

  /* FILTERS SECTION */
  .filter-section {
    background: #fff;
    padding: 20px;
    margin: 15px auto;
    max-width: 1200px;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(13, 71, 161, 0.05);
    text-align: center;
  }
  .filter-title {
    font-size: 13px; font-weight: 600; color: #1565C0;
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
  }
  .filter-container {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .filter-btn {
    background: #EEF4FF; color: #1565C0; border: 1px solid #C5D8F7;
    padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { background: #E3F2FD; }
  .filter-btn.active { background: #1976D2; color: #fff; border-color: #1976D2; }

  /* SECTION HEADER */
  .section-header {
    padding: 20px 20px 12px;
    display: flex; align-items: center; gap: 14px;
    max-width: 1200px; margin: 0 auto;
  }
  .sec-line { flex: 1; height: 1px; background: #C5D8F7; }
  .sec-title {
    font-size: 11px; font-weight: 600; color: #1976D2;
    letter-spacing: 3px; text-transform: uppercase; white-space: nowrap;
  }

  /* GRID */
  .grid-container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    padding: 10px 0;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    border: 1px solid #E3F2FD;
    position: relative;
  }

  .img-wrap {
    width: 100%; aspect-ratio: 1;
    background: #EEF4FF;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  
  .shoe-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .card:hover .shoe-img {
    transform: scale(1.05);
  }

  .ref-num {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; color: #1565C0; background: rgba(227, 242, 253, 0.9);
    padding: 2px 8px; border-radius: 6px; font-weight: 700;
    z-index: 2;
  }

  .ref-label { font-size: 12px; color: #455A64; font-weight: 700; }

  .sizes-title { font-size: 10px; color: #90A4AE; text-transform: uppercase; letter-spacing: 0.5px; }
  .sizes { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; width: 100%; min-height: 24px; }
  
  .size-select-btn {
    background: #E3F2FD; color: #1565C0;
    font-size: 11px; font-weight: 600; border: none;
    padding: 4px 9px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .size-select-btn:hover { background: #BBDEFB; }
  .size-select-btn.selected { background: #0D47A1; color: #fff; transform: scale(1.05); }
  
  .size.na { background: #F5F5F5; color: #bbb; font-size: 11px; padding: 4px 12px; border-radius: 6px; }

  /* BOTÓN COMPRA CARD */
  .order-btn {
    width: 100%; background: #25D366; color: #fff; border: none;
    padding: 10px; border-radius: 8px; font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    text-decoration: none; transition: background 0.2s;
  }
  .order-btn:hover { background: #1ebe5a; }
  .order-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* FOOTER */
  .footer { background: #0D47A1; padding: 40px 20px; text-align: center; margin-top: 40px; }
  .footer-brand { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .footer-brand span { color: #90CAF9; }
  .footer-sub { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
  .copy { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 24px; }
</style>
</head>
<body>

<div class="cover">
  <div class="badge">Colección 2026</div>
